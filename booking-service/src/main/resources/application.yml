server:
  port: 8083

spring:
  application:
    name: booking-service

  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:booking_db}
    username: ${POSTGRES_USER:ticketmaster}
    password: ${POSTGRES_PASSWORD:ticketmaster_secret}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: BookingServicePool
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.xml

  # ── Kafka ─────────────────────────────────────────────────
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:29092}
    consumer:
      group-id: booking-service-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.ticketmaster.common.event"
        max.poll.records: 10
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all          # Đảm bảo durability cho booking events
      retries: 3
      properties:
        enable.idempotence: true

  # ── Quartz Scheduler (Seat Release) ───────────────────────
  quartz:
    job-store-type: jdbc    # Persistent scheduler (survive restarts)
    jdbc:
      initialize-schema: always
    properties:
      org.quartz:
        scheduler:
          instanceName: BookingScheduler
          instanceId: AUTO
        threadPool:
          threadCount: 5
        jobStore:
          class: org.quartz.impl.jdbcjobstore.JobStoreTX
          driverDelegateClass: org.quartz.impl.jdbcjobstore.PostgreSQLDelegate
          dataSource: default
          tablePrefix: QRTZ_
          isClustered: false

# ── Redisson (Distributed Lock config) ───────────────────────
# Redisson lấy Redis config từ spring.data.redis hoặc redisson.yml
redisson:
  address: redis://${REDIS_HOST:localhost}:${REDIS_PORT:6379}
  password: ${REDIS_PASSWORD:redis_secret}
  connection-pool-size: 10
  connection-minimum-idle-size: 2

# Booking business config
booking:
  seat-lock-ttl-minutes: 2      # Giữ ghế 2 phút
  max-seats-per-booking: 8
  payment-timeout-minutes: 10

# ── Eureka ───────────────────────────────────────────────────
eureka:
  client:
    service-url:
      defaultZone: http://eureka:eureka_secret@localhost:8761/eureka/
    fetch-registry: true
    register-with-eureka: true
  instance:
    prefer-ip-address: true

# ── JWT ──────────────────────────────────────────────────────
jwt:
  secret: ${JWT_SECRET:ThisIsAVeryLongSecretKeyForJWTGenerationThatShouldBeAtLeast256Bits}

# ── Actuator ──────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    export:
      prometheus:
        enabled: true

logging:
  level:
    com.ticketmaster.booking: DEBUG
    org.redisson: WARN

---
spring:
  config:
    activate:
      on-profile: docker
eureka:
  client:
    service-url:
      defaultZone: http://eureka:eureka_secret@service-registry:8761/eureka/
logging:
  level:
    com.ticketmaster.booking: INFO