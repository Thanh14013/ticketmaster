# ================================================================
#  TICKETMASTER – Nginx Configuration
#  Vai trò: Reverse proxy / Load Balancer đứng trước API Gateway
#
#  Luồng request:
#    Client → Nginx (:80) → Spring Cloud Gateway (:8080) → Services
#
#  Tính năng:
#    - Rate limiting (auth: 10 req/min, api: 100 req/min)
#    - SSE (Server-Sent Events): tắt buffer, timeout dài
#    - Security headers
#    - Gzip compression
#    - Health check endpoint riêng
# ================================================================

worker_processes  auto;
worker_rlimit_nofile 65535;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections 1024;
    use                epoll;
    multi_accept       on;
}

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ── Logging ──────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time uct=$upstream_connect_time '
                    'uht=$upstream_header_time urt=$upstream_response_time';

    access_log /var/log/nginx/access.log main;

    # ── Performance ───────────────────────────────────────────────
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    keepalive_requests 100;
    server_tokens      off;   # Ẩn version Nginx khỏi response headers

    # ── Gzip Compression ─────────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_buffers      16 8k;
    gzip_http_version 1.1;
    gzip_min_length   1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/json
        application/javascript
        application/x-javascript
        application/xml
        application/x-font-ttf
        font/opentype
        image/svg+xml;

    # ── Rate Limiting Zones ───────────────────────────────────────
    # auth_limit  : endpoint đăng nhập / đăng ký – nghiêm ngặt hơn
    # api_limit   : các API thông thường
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/m;
    limit_req_zone $binary_remote_addr zone=api_limit:10m  rate=100r/m;

    # ── Upstream: Spring Cloud API Gateway ───────────────────────
    upstream api_gateway {
        server        api-gateway:8080;
        keepalive     32;
        keepalive_requests 100;
        keepalive_timeout  60s;
    }

    # ── Server Block ──────────────────────────────────────────────
    server {
        listen      80;
        server_name localhost;

        # ── Security Headers ─────────────────────────────────────
        add_header X-Frame-Options           "SAMEORIGIN"                    always;
        add_header X-Content-Type-Options    "nosniff"                       always;
        add_header X-XSS-Protection          "1; mode=block"                 always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy        "geolocation=(), microphone=()" always;

        # ── Nginx Health Check (không đẩy lên upstream) ──────────
        location = /health {
            access_log off;
            add_header Content-Type application/json;
            return 200 '{"status":"UP","service":"nginx"}';
        }

        # ── Auth Endpoints: Rate Limit nghiêm ────────────────────
        # /api/v1/auth/login, /api/v1/auth/register, /api/v1/auth/refresh
        location /api/v1/auth/ {
            limit_req       zone=auth_limit burst=5 nodelay;
            limit_req_status 429;

            proxy_pass         http://api_gateway;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";

            proxy_connect_timeout 10s;
            proxy_send_timeout    30s;
            proxy_read_timeout    30s;
        }

        # ── SSE Endpoint: tắt buffer, timeout dài ────────────────
        # Dùng cho real-time booking notifications
        location /api/v1/notifications/stream {
            limit_req       zone=api_limit burst=20 nodelay;
            limit_req_status 429;

            proxy_pass         http://api_gateway;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # SSE requires:
            proxy_set_header   Connection        "";   # Disable keep-alive upgrade
            proxy_buffering    off;                    # Không buffer SSE events
            proxy_cache        off;
            proxy_read_timeout 3600s;                  # 1 giờ – giữ SSE connection
            chunked_transfer_encoding on;

            add_header Cache-Control   "no-cache"  always;
            add_header X-Accel-Buffering "no"      always;
        }

        # ── Stripe Webhook: không rate limit, forward toàn bộ body ──
        location /api/v1/payments/webhook {
            proxy_pass         http://api_gateway;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";

            # Stripe cần raw body để verify signature
            proxy_request_buffering on;
            client_max_body_size    1m;
        }

        # ── Actuator: chỉ cho phép từ internal network ───────────
        location /actuator {
            allow  172.16.0.0/12;  # Docker bridge network
            allow  10.0.0.0/8;
            allow  127.0.0.1;
            deny   all;

            proxy_pass       http://api_gateway;
            proxy_set_header Host            $host;
            proxy_set_header X-Real-IP       $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ── Tất cả API còn lại ───────────────────────────────────
        location /api/ {
            limit_req       zone=api_limit burst=50 nodelay;
            limit_req_status 429;

            proxy_pass         http://api_gateway;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";

            proxy_connect_timeout 10s;
            proxy_send_timeout    60s;
            proxy_read_timeout    60s;

            client_max_body_size 10m;
        }

        # ── 404 fallback ─────────────────────────────────────────
        location / {
            add_header Content-Type application/json;
            return 404 '{"error":"Not Found","message":"The requested resource does not exist."}';
        }

        # ── Error pages ───────────────────────────────────────────
        error_page 429 /429.json;
        location = /429.json {
            internal;
            add_header Content-Type  application/json always;
            add_header Retry-After   60               always;
            return 429 '{"error":"Too Many Requests","message":"Rate limit exceeded. Please try again later."}';
        }

        error_page 502 503 504 /5xx.json;
        location = /5xx.json {
            internal;
            add_header Content-Type application/json always;
            return 503 '{"error":"Service Unavailable","message":"The service is temporarily unavailable. Please try again."}';
        }
    }
}