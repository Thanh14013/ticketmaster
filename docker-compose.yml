version: '3.9'

# ================================================================
#  TICKETMASTER – Docker Compose
#  Chạy: docker compose up -d
#  Dừng: docker compose down
#  Rebuild: docker compose up -d --build
#
#  Thứ tự khởi động:
#    postgres + redis + zookeeper
#      → kafka
#        → service-registry
#          → api-gateway
#            → user / event / booking / payment / notification
# ================================================================

networks:
  ticketmaster-net:
    driver: bridge
    name: ticketmaster-net

volumes:
  postgres_data:
    name: tm_postgres_data
  redis_data:
    name: tm_redis_data
  kafka_data:
    name: tm_kafka_data
  zookeeper_data:
    name: tm_zookeeper_data
  grafana_data:
    name: tm_grafana_data
  prometheus_data:
    name: tm_prometheus_data

# ================================================================
services:

  # ──────────────────────────────────────────────────────────────
  # LAYER 1 – DATABASE & CACHE
  # ──────────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    container_name: tm-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       postgres
      PGDATA:            /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/postgres/init-databases.sql:/docker-entrypoint-initdb.d/01-init-databases.sql:ro
    ports:
      - "${POSTGRES_EXTERNAL_PORT:-5432}:5432"
    networks:
      - ticketmaster-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  redis:
    image: redis:7-alpine
    container_name: tm-redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfsync everysec
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_EXTERNAL_PORT:-6379}:6379"
    networks:
      - ticketmaster-net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ──────────────────────────────────────────────────────────────
  # LAYER 2 – MESSAGE BROKER (Kafka)
  # ──────────────────────────────────────────────────────────────

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: tm-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME:   2000
      ZOOKEEPER_SYNC_LIMIT:  2
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
    networks:
      - ticketmaster-net
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | nc -w 2 localhost 2181 | grep imok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: tm-kafka
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID:                        1
      KAFKA_ZOOKEEPER_CONNECT:                zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS:             PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:${KAFKA_EXTERNAL_PORT:-29092}
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP:   PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME:       PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR:    1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE:        'false'   # Topics tạo thủ công qua kafka-setup.sh
      KAFKA_LOG_RETENTION_HOURS:              168        # 7 days
      KAFKA_LOG_SEGMENT_BYTES:                1073741824
      KAFKA_NUM_PARTITIONS:                   3
      KAFKA_DEFAULT_REPLICATION_FACTOR:       1
    volumes:
      - kafka_data:/var/lib/kafka/data
    ports:
      - "${KAFKA_EXTERNAL_PORT:-29092}:${KAFKA_EXTERNAL_PORT:-29092}"
    networks:
      - ticketmaster-net
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 > /dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  kafka-init:
    image: confluentinc/cp-kafka:7.6.0
    container_name: tm-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    volumes:
      - ./infrastructure/kafka/kafka-setup.sh:/kafka-setup.sh:ro
    entrypoint: ["/bin/bash", "/kafka-setup.sh"]
    environment:
      KAFKA_BROKER: kafka:9092
    networks:
      - ticketmaster-net
    restart: "no"   # Chỉ chạy một lần khi init

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: tm-kafka-ui
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_CLUSTERS_0_NAME:             ticketmaster-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      SERVER_SERVLET_CONTEXT_PATH:       /kafka-ui
    ports:
      - "${KAFKA_UI_PORT:-8090}:8080"
    networks:
      - ticketmaster-net

  # ──────────────────────────────────────────────────────────────
  # LAYER 3 – MONITORING
  # ──────────────────────────────────────────────────────────────

  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: tm-prometheus
    restart: unless-stopped
    volumes:
      - ./infrastructure/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.enable-lifecycle'
      - '--web.enable-admin-api'
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    networks:
      - ticketmaster-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9090/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 3

  grafana:
    image: grafana/grafana:10.4.2
    container_name: tm-grafana
    restart: unless-stopped
    depends_on:
      prometheus:
        condition: service_healthy
    environment:
      GF_SECURITY_ADMIN_USER:     ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP:     'false'
      GF_SERVER_ROOT_URL:         http://localhost:${GRAFANA_PORT:-3000}
      GF_ANALYTICS_REPORTING_ENABLED: 'false'
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infrastructure/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    networks:
      - ticketmaster-net

  # ──────────────────────────────────────────────────────────────
  # LAYER 4 – SPRING CLOUD INFRASTRUCTURE
  # ──────────────────────────────────────────────────────────────

  service-registry:
    build:
      context: .
      dockerfile: service-registry/Dockerfile
    image: ticketmaster/service-registry:latest
    container_name: tm-service-registry
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-docker}
      EUREKA_USERNAME:         ${EUREKA_USERNAME}
      EUREKA_PASSWORD:         ${EUREKA_PASSWORD}
    ports:
      - "${SERVICE_REGISTRY_PORT:-8761}:8761"
    networks:
      - ticketmaster-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://${EUREKA_USERNAME}:${EUREKA_PASSWORD}@localhost:8761/actuator/health | grep UP || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 45s

  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    image: ticketmaster/api-gateway:latest
    container_name: tm-api-gateway
    restart: unless-stopped
    depends_on:
      service-registry:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE:                  ${SPRING_PROFILES_ACTIVE:-docker}
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:    http://${EUREKA_USERNAME}:${EUREKA_PASSWORD}@service-registry:8761/eureka/
      REDIS_HOST:                              ${REDIS_HOST}
      REDIS_PORT:                              ${REDIS_PORT}
      REDIS_PASSWORD:                          ${REDIS_PASSWORD}
      JWT_SECRET:                              ${JWT_SECRET}
      CORS_ALLOWED_ORIGINS:                    ${CORS_ALLOWED_ORIGINS}
    ports:
      - "${API_GATEWAY_PORT:-8080}:8080"
    networks:
      - ticketmaster-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health | grep UP || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 45s

  # ──────────────────────────────────────────────────────────────
  # LAYER 5 – BUSINESS MICROSERVICES
  # ──────────────────────────────────────────────────────────────

  user-service:
    build:
      context: .
      dockerfile: user-service/Dockerfile
    image: ticketmaster/user-service:latest
    container_name: tm-user-service
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      service-registry:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE:                  ${SPRING_PROFILES_ACTIVE:-docker}
      POSTGRES_HOST:                           ${POSTGRES_HOST}
      POSTGRES_PORT:                           ${POSTGRES_PORT}
      POSTGRES_DB:                             ${USER_DB}
      POSTGRES_USER:                           ${POSTGRES_USER}
      POSTGRES_PASSWORD:                       ${POSTGRES_PASSWORD}
      REDIS_HOST:                              ${REDIS_HOST}
      REDIS_PORT:                              ${REDIS_PORT}
      REDIS_PASSWORD:                          ${REDIS_PASSWORD}
      JWT_SECRET:                              ${JWT_SECRET}
      JWT_EXPIRATION_MS:                       ${JWT_EXPIRATION_MS}
      JWT_REFRESH_EXPIRATION_MS:               ${JWT_REFRESH_EXPIRATION_MS}
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:    http://${EUREKA_USERNAME}:${EUREKA_PASSWORD}@service-registry:8761/eureka/
    ports:
      - "${USER_SERVICE_PORT:-8081}:8081"
    networks:
      - ticketmaster-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/actuator/health | grep UP || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 60s

  event-service:
    build:
      context: .
      dockerfile: event-service/Dockerfile
    image: ticketmaster/event-service:latest
    container_name: tm-event-service
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      service-registry:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE:                  ${SPRING_PROFILES_ACTIVE:-docker}
      POSTGRES_HOST:                           ${POSTGRES_HOST}
      POSTGRES_PORT:                           ${POSTGRES_PORT}
      POSTGRES_DB:                             ${EVENT_DB}
      POSTGRES_USER:                           ${POSTGRES_USER}
      POSTGRES_PASSWORD:                       ${POSTGRES_PASSWORD}
      REDIS_HOST:                              ${REDIS_HOST}
      REDIS_PORT:                              ${REDIS_PORT}
      REDIS_PASSWORD:                          ${REDIS_PASSWORD}
      KAFKA_BOOTSTRAP_SERVERS:                 ${KAFKA_BOOTSTRAP_SERVERS}
      KAFKA_GROUP_ID:                          ${KAFKA_GROUP_EVENT}
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:    http://${EUREKA_USERNAME}:${EUREKA_PASSWORD}@service-registry:8761/eureka/
    ports:
      - "${EVENT_SERVICE_PORT:-8082}:8082"
    networks:
      - ticketmaster-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8082/actuator/health | grep UP || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 60s

  booking-service:
    build:
      context: .
      dockerfile: booking-service/Dockerfile
    image: ticketmaster/booking-service:latest
    container_name: tm-booking-service
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      service-registry:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE:                  ${SPRING_PROFILES_ACTIVE:-docker}
      POSTGRES_HOST:                           ${POSTGRES_HOST}
      POSTGRES_PORT:                           ${POSTGRES_PORT}
      POSTGRES_DB:                             ${BOOKING_DB}
      POSTGRES_USER:                           ${POSTGRES_USER}
      POSTGRES_PASSWORD:                       ${POSTGRES_PASSWORD}
      REDIS_HOST:                              ${REDIS_HOST}
      REDIS_PORT:                              ${REDIS_PORT}
      REDIS_PASSWORD:                          ${REDIS_PASSWORD}
      KAFKA_BOOTSTRAP_SERVERS:                 ${KAFKA_BOOTSTRAP_SERVERS}
      KAFKA_GROUP_ID:                          ${KAFKA_GROUP_BOOKING}
      BOOKING_SEAT_LOCK_TTL_MINUTES:           ${BOOKING_SEAT_LOCK_TTL_MINUTES}
      BOOKING_MAX_SEATS_PER_ORDER:             ${BOOKING_MAX_SEATS_PER_ORDER}
      BOOKING_PAYMENT_TIMEOUT_MINUTES:         ${BOOKING_PAYMENT_TIMEOUT_MINUTES}
      JWT_SECRET:                              ${JWT_SECRET}
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:    http://${EUREKA_USERNAME}:${EUREKA_PASSWORD}@service-registry:8761/eureka/
    ports:
      - "${BOOKING_SERVICE_PORT:-8083}:8083"
    networks:
      - ticketmaster-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8083/actuator/health | grep UP || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 60s

  payment-service:
    build:
      context: .
      dockerfile: payment-service/Dockerfile
    image: ticketmaster/payment-service:latest
    container_name: tm-payment-service
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      service-registry:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE:                  ${SPRING_PROFILES_ACTIVE:-docker}
      POSTGRES_HOST:                           ${POSTGRES_HOST}
      POSTGRES_PORT:                           ${POSTGRES_PORT}
      POSTGRES_DB:                             ${PAYMENT_DB}
      POSTGRES_USER:                           ${POSTGRES_USER}
      POSTGRES_PASSWORD:                       ${POSTGRES_PASSWORD}
      KAFKA_BOOTSTRAP_SERVERS:                 ${KAFKA_BOOTSTRAP_SERVERS}
      KAFKA_GROUP_ID:                          ${KAFKA_GROUP_PAYMENT}
      STRIPE_SECRET_KEY:                       ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET:                   ${STRIPE_WEBHOOK_SECRET}
      STRIPE_CURRENCY:                         ${STRIPE_CURRENCY}
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:    http://${EUREKA_USERNAME}:${EUREKA_PASSWORD}@service-registry:8761/eureka/
    ports:
      - "${PAYMENT_SERVICE_PORT:-8084}:8084"
    networks:
      - ticketmaster-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8084/actuator/health | grep UP || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 60s

  notification-service:
    build:
      context: .
      dockerfile: notification-service/Dockerfile
    image: ticketmaster/notification-service:latest
    container_name: tm-notification-service
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      service-registry:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE:                  ${SPRING_PROFILES_ACTIVE:-docker}
      POSTGRES_HOST:                           ${POSTGRES_HOST}
      POSTGRES_PORT:                           ${POSTGRES_PORT}
      POSTGRES_DB:                             ${NOTIFICATION_DB}
      POSTGRES_USER:                           ${POSTGRES_USER}
      POSTGRES_PASSWORD:                       ${POSTGRES_PASSWORD}
      KAFKA_BOOTSTRAP_SERVERS:                 ${KAFKA_BOOTSTRAP_SERVERS}
      KAFKA_GROUP_ID:                          ${KAFKA_GROUP_NOTIFICATION}
      MAIL_HOST:                               ${MAIL_HOST}
      MAIL_PORT:                               ${MAIL_PORT}
      MAIL_USERNAME:                           ${MAIL_USERNAME}
      MAIL_PASSWORD:                           ${MAIL_PASSWORD}
      MAIL_FROM_NAME:                          ${MAIL_FROM_NAME}
      MAIL_FROM_ADDRESS:                       ${MAIL_FROM_ADDRESS}
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:    http://${EUREKA_USERNAME}:${EUREKA_PASSWORD}@service-registry:8761/eureka/
    ports:
      - "${NOTIFICATION_SERVICE_PORT:-8085}:8085"
    networks:
      - ticketmaster-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8085/actuator/health | grep UP || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 60s